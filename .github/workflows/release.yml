# Release workflow — publishes to npm on version tag push.
# Manual trigger only until npm token is configured.
#
# To activate:
#   1. Add NPM_TOKEN to repo secrets (Settings → Secrets → Actions)
#   2. Change trigger from workflow_dispatch to:
#      on:
#        push:
#          tags: ['v*']

name: Release

on:
  workflow_dispatch:
    inputs:
      dry_run:
        description: Dry run (no actual publish)
        type: boolean
        default: true

jobs:
  publish:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write  # for npm provenance
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          registry-url: https://registry.npmjs.org

      - name: Install dependencies
        run: npm ci

      - name: Typecheck
        run: npm run typecheck

      - name: Test
        run: npm test

      - name: Build
        run: npm run build

      - name: Publish (dry-run)
        if: ${{ inputs.dry_run }}
        run: npm publish --dry-run

      - name: Publish
        if: ${{ !inputs.dry_run }}
        run: npm publish --provenance --access public
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
